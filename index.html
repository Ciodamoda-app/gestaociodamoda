<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CioDaModa - Admin Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Overlay de Carregamento Global -->
    <div id="loader-overlay" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Container de Toasts (Alertas) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Tela de Login -->
    <div id="login-view" class="view login-view">
        <div class="login-card">
            <div class="brand-logo">
                <span class="material-symbols-outlined logo-icon">storefront</span>
                <h1>CioDaModa</h1>
            </div>
            <p class="login-subtitle">Acesso restrito ao painel administrativo</p>
            <button id="btn-login-google" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- Dashboard Completo -->
    <div id="dashboard-view" class="view dashboard-view hidden">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="material-symbols-outlined logo-icon">storefront</span>
                <h2>CioDaModa</h2>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-module="inicio">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span>Início</span>
                </a>
                <a href="#" class="nav-item" data-module="inventario">
                    <span class="material-symbols-outlined">inventory_2</span>
                    <span>Inventário</span>
                </a>
                <a href="#" class="nav-item" data-module="configuracoes">
                    <span class="material-symbols-outlined">settings</span>
                    <span>Configurações</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <img id="user-avatar" src="" alt="Avatar do usuário" class="avatar">
                    <div class="user-details">
                        <span id="user-name" class="name">Carregando...</span>
                        <span id="user-email" class="email">...</span>
                    </div>
                </div>
                <button id="btn-logout" class="btn-icon" title="Sair">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <button id="btn-menu-toggle" class="btn-icon menu-toggle">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <h2 id="current-module-title">Início</h2>
            </header>
            
            <div id="content-area" class="content-area">
                <!-- O conteúdo dos módulos será injetado aqui -->
                <div class="module-content" id="module-inicio">
                    <h3>Bem-vindo ao CioDaModa Admin 2.0</h3>
                    <p>Selecione um módulo no menu lateral para começar.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- O app deve ser carregado como módulo para uso em v10 do Firebase e ES6 -->
    <script type="module" src="main.js"></script>
</body>
</html>
