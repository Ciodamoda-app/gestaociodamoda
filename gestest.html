<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                      "outline-variant": "#c5c6cd",

                      "on-surface": "#0d1c2f",

                      "secondary": "#0058be",

                      "outline": "#75777d",
                      "secondary-container": "#2170e4",
                      "surface-tint": "#545f73",
                      "on-secondary-fixed": "#001a42"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "sm": "8px",
                      "xl": "32px",
                      "md": "16px",
                      "lg": "24px",
                      "base": "4px",
                      "sidebar_width": "280px",
                      "container_max_width": "1440px",
                      "xs": "4px"
              },
              "fontFamily": {
                      "body-lg": ["Inter"],
                      "label-sm": ["Inter"],
                      "h1": ["Inter"],

              "fontSize": {

                      "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "600"}],

          }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex">
<!-- SideNavBar -->
<nav class="bg-slate-900 text-white fixed left-0 top-0 h-full w-[280px] border-r border-slate-800 flex flex-col z-50">
<div class="p-6 border-b border-slate-800 flex flex-col gap-1">
<h1 class="text-xl font-black text-white tracking-tight">CioDaModa</h1>
<span class="font-inter text-sm font-medium tracking-tight text-slate-400">Executive Panel</span>
</div>
<div class="flex-1 py-4 flex flex-col gap-1">
<a class="text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 flex items-center gap-3 transition-colors cursor-pointer active:opacity-80 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined">dashboard</span>
                Dashboard
            </a>
<a class="text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 flex items-center gap-3 transition-colors cursor-pointer active:opacity-80 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined">group</span>
                Clients
            </a>
<a class="text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 flex items-center gap-3 transition-colors cursor-pointer active:opacity-80 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined">factory</span>
                Suppliers
            </a>
<a class="text-slate-400 hover:bg-white/5 hover:text-white px-4 py-3 flex items-center gap-3 transition-colors cursor-pointer active:opacity-80 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined">inventory_2</span>
                Products
            </a>
<a class="bg-white/10 text-white border-l-4 border-blue-500 px-4 py-3 flex items-center gap-3 cursor-pointer active:opacity-80 font-inter text-sm font-medium tracking-tight" href="#">
<span class="material-symbols-outlined icon-fill">swap_horiz</span>
                Transactions
            </a>
</div>
<div class="p-4 border-t border-slate-800">
<button class="w-full bg-white/10 hover:bg-white/20 text-white py-2 px-4 rounded transition-colors flex items-center justify-center gap-2 font-inter text-sm font-medium tracking-tight">
<span class="material-symbols-outlined">add</span>
                New Transaction
            </button>
</div>
</nav>
<!-- TopNavBar -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md fixed top-0 right-0 w-[calc(100%-280px)] border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 h-16 ml-[280px] z-40 shadow-sm font-inter text-base text-slate-900 dark:text-slate-100">
<div class="flex-1">
<!-- Search hidden as per 'on_left' but no explicit styling requested beyond layout -->
</div>
<div class="flex items-center gap-4">
<button class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
<button class="text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
<div class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden ml-2 border border-slate-300">
<img alt="Administrator Profile" class="w-full h-full object-cover" data-alt="Corporate headshot of a smiling professional man in a dark blue suit" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCl6Mf9rYeOjCr11mW_iNplaAVxFkToHbBvgLRkehinyvbnuoFyj1e9udRSR8t8-CwMokIZCEcd6NBJzngh3ikxiN8nRzBDTkKUm1TlgD8bT9K8yq0vRR7bpBz2TQAQzYeTY814X-3Zye6Tj8Z8UCZksMR9n5VKQiuMDGXxo7fhZgIDoGHoO0EIjanEqkbXtUXp5qp-_y3wWo_RbMEPEwM2rzoHbQ7p_nuu6ORVBdGvwS3ekrVWnf8JRjszK8KqPQZbJAZ1up6U95_p"/>
</div>
</div>
</header>
<!-- Main Content -->
<main class="ml-[280px] mt-[64px] flex-1 p-xl w-full max-w-[container_max_width]">
<div class="mb-lg">
<h2 class="font-h2 text-h2 text-primary">Nova Transação</h2>
<p class="text-on-surface-variant mt-xs">Registre uma nova entrada ou saída de mercadoria.</p>
</div>
<form class="bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-lg w-full max-w-4xl">
<!-- Type Toggle -->
<div class="mb-xl">
<fieldset class="flex gap-4">
<legend class="sr-only">Tipo de Operação</legend>
<label class="flex-1 relative cursor-pointer group">
<input checked="" class="peer sr-only" name="transaction_type" type="radio" value="buy"/>
<div class="w-full text-center py-4 rounded-lg border-2 border-outline-variant peer-checked:border-on-tertiary-container peer-checked:bg-on-tertiary-container/10 transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-outline group-hover:text-on-tertiary-container peer-checked:text-on-tertiary-container text-3xl">south_west</span>
<span class="font-h3 text-h3 text-on-surface-variant peer-checked:text-on-tertiary-container">COMPRA</span>
<span class="font-label-sm text-label-sm text-outline peer-checked:text-on-tertiary-container opacity-80">(Entrada)</span>
</div>
</label>
<label class="flex-1 relative cursor-pointer group">
<input class="peer sr-only" name="transaction_type" type="radio" value="sell"/>
<div class="w-full text-center py-4 rounded-lg border-2 border-outline-variant peer-checked:border-secondary peer-checked:bg-secondary/10 transition-all flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-outline group-hover:text-secondary peer-checked:text-secondary text-3xl">north_east</span>
<span class="font-h3 text-h3 text-on-surface-variant peer-checked:text-secondary">VENDA</span>
<span class="font-label-sm text-label-sm text-outline peer-checked:text-secondary opacity-80">(Saída)</span>
</div>
</label>
</fieldset>
</div>
<!-- Form Fields Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg mb-xl border-t border-outline-variant pt-lg">
<div class="md:col-span-2">
<label class="block font-label-sm text-label-sm text-primary mb-xs" for="product">Produto</label>
<div class="relative">
<select class="w-full bg-surface-bright border-outline-variant rounded-DEFAULT py-3 pl-4 pr-10 focus:border-secondary focus:ring-1 focus:ring-secondary font-body-md text-body-md text-primary appearance-none transition-colors" id="product">
<option value="">Selecione um produto...</option>
<option value="p1">Camisa Social Branca - Lote A</option>
<option value="p2">Calça Alfaiataria Preta</option>
<option value="p3">Blazer Lã Fria Azul Marinho</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-sm text-label-sm text-primary mb-xs" for="quantity">Quantidade</label>
<input class="w-full bg-surface-bright border-outline-variant rounded-DEFAULT py-3 px-4 focus:border-secondary focus:ring-1 focus:ring-secondary font-data-mono text-data-mono text-primary transition-colors" id="quantity" placeholder="0" type="number"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-primary mb-xs" for="value">Valor Unitário (R$)</label>
<input class="w-full bg-surface-bright border-outline-variant rounded-DEFAULT py-3 px-4 focus:border-secondary focus:ring-1 focus:ring-secondary font-data-mono text-data-mono text-primary transition-colors" id="value" placeholder="0,00" type="text"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-primary mb-xs" for="op_date">Data da Operação</label>
<input class="w-full bg-surface-bright border-outline-variant rounded-DEFAULT py-3 px-4 focus:border-secondary focus:ring-1 focus:ring-secondary font-body-md text-body-md text-primary transition-colors" id="op_date" type="date"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-primary mb-xs" for="pay_date">Data Prevista de Pagamento</label>
<input class="w-full bg-surface-bright border-outline-variant rounded-DEFAULT py-3 px-4 focus:border-secondary focus:ring-1 focus:ring-secondary font-body-md text-body-md text-primary transition-colors" id="pay_date" type="date"/>
</div>
</div>
<!-- Actions -->
<div class="flex justify-end gap-md pt-md border-t border-outline-variant">
<button class="px-6 py-3 rounded-DEFAULT border border-outline-variant text-on-surface hover:bg-surface-container-high transition-colors font-label-sm text-label-sm uppercase tracking-wider" type="button">
                    Cancelar
                </button>
<button class="px-6 py-3 rounded-DEFAULT bg-primary-container text-on-primary hover:bg-primary transition-colors font-label-sm text-label-sm uppercase tracking-wider flex items-center gap-2" type="submit">
<span class="material-symbols-outlined text-sm">save</span>
                    Registrar Operação
                </button>
</div>
</form>
</main>
</body></html>
